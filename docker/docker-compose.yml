version: '3.9'

# 🎓 EduManager - Stack Complète
# Pour DÉVELOPPEMENT et PRODUCTION
#
# Démarrer:    docker-compose up -d
# Arrêter:     docker-compose down
# Logs:        docker-compose logs -f
# Nettoyer:    docker-compose down -v

services:

  # ═══════════════════════════════════════════════════════════
  # 🗄️  BASE DE DONNÉES PostgreSQL
  # ═══════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: edumanager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: edumanager
      POSTGRES_USER: edumanager_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-EduManager2025!}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_FR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    networks:
      - edumanager_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edumanager_user -d edumanager"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.edumanager.service=database"
    environment_file:
      - ../.env

  # ═══════════════════════════════════════════════════════════
  # 🔌 BACKEND API (Node.js/Express)
  # ═══════════════════════════════════════════════════════════
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-development}
    container_name: edumanager_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://edumanager_user:${DB_PASSWORD:-EduManager2025!}@postgres:5432/edumanager
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_key_change_this_minimum_32_chars_12345}
      JWT_EXPIRES_IN: 24h
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edumanager_network
    volumes:
      - ../backend:/app
      - /app/node_modules
    labels:
      - "com.edumanager.service=api"
    environment_file:
      - ../.env

  # ═══════════════════════════════════════════════════════════
  # 🎨 FRONTEND WEB (React)
  # ═══════════════════════════════════════════════════════════
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3001}
    container_name: edumanager_web
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3001}
      REACT_APP_BASE44_APP_ID: ${REACT_APP_BASE44_APP_ID:-69c9b24e3697466f8942132b}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - edumanager_network
    volumes:
      - ../frontend:/app
      - /app/node_modules
    labels:
      - "com.edumanager.service=web"
    environment_file:
      - ../.env

  # ═══════════════════════════════════════════════════════════
  # 🔄 NGINX Reverse Proxy (Optionnel)
  # ═══════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: edumanager_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - edumanager_network
    labels:
      - "com.edumanager.service=proxy"

# ═══════════════════════════════════════════════════════════
# VOLUMES PERSISTANTS
# ═══════════════════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local

# ═══════════════════════════════════════════════════════════
# RÉSEAUX
# ═══════════════════════════════════════════════════════════
networks:
  edumanager_network:
    driver: bridge

