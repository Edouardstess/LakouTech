databases:
  - name: edumanager-db
      plan: free

      services:
        - type: web
            name: edumanager-backend
                env: docker
                    dockerContext: backend
                        dockerfilePath: Dockerfile
                            plan: free
                                healthCheckPath: /health
                                    envVars:
                                          - key: DATABASE_URL
                                                  fromDatabase:
                                                            name: edumanager-db
                                                                      property: connectionString
                                                                            - key: JWT_SECRET
                                                                                    generateValue: true
                                                                                          - key: NODE_ENV
                                                                                                  value: production
                                                                                                        - key: PORT
                                                                                                                value: "3001"
                                                                                                                      - key: CORS_ORIGIN
                                                                                                                              value: https://edumanager-frontend.onrender.com
                                                                                                                              
                                                                                                                                - type: web
                                                                                                                                    name: edumanager-frontend
                                                                                                                                        env: docker
                                                                                                                                            dockerContext: frontend
                                                                                                                                                dockerfilePath: Dockerfile
                                                                                                                                                    plan: free
                                                                                                                                                        envVars:
                                                                                                                                                              - key: REACT_APP_API_URL
                                                                                                                                                                      value: https://edumanager-backend.onrender.com
